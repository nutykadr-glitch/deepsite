<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Site</title>
    <link rel="stylesheet" href="deepsite/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="bg" id="background">

        <div class="textBox" id="textBox">
            Добро пожаловать на глубокий сайт, путник.
        </div>

        <script>
        const textBox = document.getElementById("textBox");

        document.addEventListener("keydown", function(event) {

        if (
            event.key === "ArrowUp" ||
            event.key === "ArrowDown" ||
            event.key === "ArrowLeft" ||
            event.key === "ArrowRight"
        )   {
        textBox.classList.add("hide");
        }

        });
    </script>

        <script>

        let activated = false;
        const bg = document.getElementById("background");
        const doorSound = new Audio("deepsite/door.mp3");
        const stepsSound = new Audio("deepsite/steps.mp3");

        document.addEventListener("keydown", function(event) {

            if (event.key === "ArrowUp") {

                if (!activated) {
                    stepsSound.play();
                    setTimeout(() => {
                    bg.style.backgroundImage = "url('deepsite/images/startpage2.png')";
                    activated = true;
                    }, 200);

                } else {
                    doorSound.play();
                    setTimeout(() => {
                        window.location.href = "deepsite/main.html";
                    }, 2500);
                }
            }

            if (event.key === "ArrowLeft") {

                if (!activated) {
                    stepsSound.play();
                    setTimeout(() => {
                    bg.style.backgroundImage = "url('deepsite/images/about.png')";
                    activated = true;
                    }, 200);

                } else {
                    doorSound.play();
                    setTimeout(() => {
                        window.location.href = "deepsite/about.html";
                    }, 2500);
                }
            }

            if (event.key === "ArrowRight") {

                if (!activated) {
                    stepsSound.play();
                    setTimeout(() => {
                    bg.style.backgroundImage = "url('deepsite/images/contacts.png')";
                    activated = true;
                    }, 200);

                } else {
                    doorSound.play();
                    setTimeout(() => {
                        window.location.href = "deepsite/contacts.html";
                    }, 2500);
                }
            }

            if (event.key === "ArrowDown") {
                stepsSound.play();
                setTimeout(() => {
                activated = false;
                bg.style.backgroundImage = "url('deepsite/images/startpage.png')";
                }, 200);
            }

        });
    </script>
    </div>

    

</body>

</html>
